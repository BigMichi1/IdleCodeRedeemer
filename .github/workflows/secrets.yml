name: Secret Scanning

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  secrets:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: ${{ github.event.after || 'HEAD' }}
          extra_args: --debug

  environment-files:
    name: Check for Untracked Environment Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect untracked .env files
        run: |
          set +e
          found_env_files=0
          
          for file in .env .env.local .env.*.local .env.production; do
            if [ -f "$file" ] && git ls-files --error-unmatch "$file" > /dev/null 2>&1; then
              echo "❌ ERROR: Tracked environment file found: $file"
              echo "   This file should NOT be committed to the repository!"
              echo ""
              found_env_files=1
            fi
          done
          
          if [ $found_env_files -eq 1 ]; then
            echo "Remove the file from git history:"
            echo "  git rm --cached <filename>"
            echo "  git commit -m 'Remove tracked env file'"
            exit 1
          else
            echo "✅ No tracked environment files found"
          fi

      - name: Check for sensitive keywords
        run: |
          set +e
          found_issues=0
          
          # Check for common secret patterns in committed files
          patterns=(
            "DISCORD_TOKEN"
            "DATABASE_URL"
            "API_KEY"
            "SECRET_KEY"
            "PRIVATE_KEY"
            "aws_access_key"
            "password"
          )
          
          for pattern in "${patterns[@]}"; do
            if git grep -i "$pattern" -- ':!.env*' ':!.gitignore' ':!*.md' | grep -v "node_modules" > /dev/null; then
              echo "⚠️  WARNING: Found potential secret pattern '$pattern' in committed files"
              git grep -i "$pattern" -- ':!.env*' ':!.gitignore' ':!*.md' | grep -v "node_modules" | head -5
              found_issues=1
            fi
          done
          
          if [ $found_issues -eq 1 ]; then
            echo ""
            echo "Please review the above and ensure no real secrets are committed."
            exit 1
          else
            echo "✅ No obvious secret patterns found in code"
          fi
