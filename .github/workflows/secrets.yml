name: Secret Scanning

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  secrets:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: ${{ github.event.after || 'HEAD' }}
          extra_args: --debug

  environment-files:
    name: Check for Untracked Environment Files
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect untracked .env files
        run: |
          set +e
          found_env_files=0
          
          for file in .env .env.local .env.*.local .env.production; do
            if [ -f "$file" ] && git ls-files --error-unmatch "$file" > /dev/null 2>&1; then
              echo "❌ ERROR: Tracked environment file found: $file"
              echo "   This file should NOT be committed to the repository!"
              echo ""
              found_env_files=1
            fi
          done
          
          if [ $found_env_files -eq 1 ]; then
            echo "Remove the file from git history:"
            echo "  git rm --cached <filename>"
            echo "  git commit -m 'Remove tracked env file'"
            exit 1
          else
            echo "✅ No tracked environment files found"
          fi

      - name: Check for sensitive keywords
        run: |
          set +e
          found_issues=0
          
          # Check for common secret patterns in committed files
          # Excludes: example files, docs, config, type definitions, and app code that uses env vars
          patterns=(
            "DISCORD_TOKEN"
            "DATABASE_URL"
            "API_KEY"
            "SECRET_KEY"
            "PRIVATE_KEY"
            "aws_access_key"
            "password"
          )
          
          for pattern in "${patterns[@]}"; do
            # Exclude: .env files, docs, config, examples, node_modules, type defs, workflows, gitleaks ignore, and app code that uses env vars
            if git grep -i "$pattern" -- \
              ':!.env*' \
              ':!*.example' \
              ':!*.md' \
              ':!*.yml' \
              ':!*.yaml' \
              ':!*.toml' \
              ':!*.gitignore*' \
              ':!.gitleaksignore' \
              ':!node_modules' \
              ':!*.d.ts' \
              ':!.github' \
              ':!src/bot/bot.ts' | grep -v "node_modules" > /dev/null 2>&1; then
              echo "⚠️  WARNING: Found potential secret pattern '$pattern' in committed files"
              git grep -i "$pattern" -- \
                ':!.env*' \
                ':!*.example' \
                ':!*.md' \
                ':!*.yml' \
                ':!*.yaml' \
                ':!*.toml' \
                ':!*.gitignore*' \
                ':!.gitleaksignore' \
                ':!node_modules' \
                ':!*.d.ts' \
                ':!.github' \
                ':!src/bot/bot.ts' | grep -v "node_modules" | head -5
              found_issues=1
            fi
          done
          
          if [ $found_issues -eq 1 ]; then
            echo ""
            echo "Please review the above and ensure no real secrets are committed."
            exit 1
          else
            echo "✅ No obvious secret patterns found in code"
          fi
