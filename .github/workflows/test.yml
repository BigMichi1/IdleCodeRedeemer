name: Tests & Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # needed to post/delete coverage comments on PRs

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 90

      # Download the most recent coverage artifact from the base branch (main).
      # Used for the per-PR coverage diff comment below.
      # continue-on-error so the job does not fail when no artifact exists yet
      # (e.g. the very first push to main, or a fork PR).
      - name: Download base branch coverage
        if: github.event_name == 'pull_request'
        id: base-coverage
        uses: dawidd6/action-download-artifact@v9
        continue-on-error: true
        with:
          branch: ${{ github.base_ref }}
          name: coverage
          path: coverage-base
          workflow: test.yml
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post coverage diff comment (base available)
        if: github.event_name == 'pull_request' && steps.base-coverage.outcome == 'success'
        uses: romeovs/lcov-reporter-action@v0.4.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info
          lcov-base: ./coverage-base/lcov.info
          delete-old-comments: true

      - name: Post coverage comment (no base available)
        if: github.event_name == 'pull_request' && steps.base-coverage.outcome != 'success'
        uses: romeovs/lcov-reporter-action@v0.4.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info
          delete-old-comments: true
