version: 2
updates:
  # Bun dependencies
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - BigMichi1
      - Copilot
    labels:
      - "dependencies"
      - "automerge"
      - "bun"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    versioning-strategy: lockfile-only

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    reviewers:
      - BigMichi1
      - Copilot
    labels:
      - "dependencies"
      - "automerge"
      - "github_actions"

  # Docker dependencies
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    reviewers:
      - BigMichi1
      - Copilot
    labels:
      - "dependencies"
      - "automerge"
      - "docker"

  # Docker Compose dependencies
  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
    reviewers:
      - BigMichi1
      - Copilot
    labels:
      - "dependencies"
      - "automerge"
      - "docker_compose"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
