version: 2
updates:
  # Bun dependencies
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - bigmichi1
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    versioning-strategy: lockfile-only

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    reviewers:
      - bigmichi1
    commit-message:
      prefix: "ci:"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    cooldown:
      default-days: 3

  # Docker dependencies
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    reviewers:
      - bigmichi1
    commit-message:
      prefix: "chore(docker):"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    cooldown:
      default-days: 7

  # Docker Compose dependencies
  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
    reviewers:
      - bigmichi1
    commit-message:
      prefix: "chore(docker-compose):"
    pull-request-branch-name:
      separator: "/"
    rebase-strategy: auto
    cooldown:
      default-days: 7
