[env]
# Mise environment configuration for Idle Code Redeemer Bot
# Disable SSL cert validation for Idle Champions API (expired certificate)
NODE_TLS_REJECT_UNAUTHORIZED = "0"

[tools]
# Bun runtime and package manager
bun = "1.3.14"
# Gitleaks for secret detection
gitleaks = "8.30.1"

[tasks.install]
description = "Install dependencies with Bun"
run = "bun install"

[tasks."prod:install"]
description = "Install production dependencies only with Bun"
run = "bun install --production --frozen-lockfile --ignore-scripts"

[tasks.dev]
description = "Run bot in development mode with TypeScript support"
run = "bun run dev"
env = { NODE_ENV = "development" }

[tasks.build]
description = "Build standalone executable with Bun"
run = "bun run build"

[tasks.typecheck]
description = "Type-check TypeScript source without emitting files"
run = "bun run typecheck"

[tasks.test]
description = "Run all tests"
run = "bun test"

[tasks."test:coverage"]
description = "Run all tests with LCOV coverage report (output: coverage/lcov.info)"
run = "bun test --coverage --coverage-reporter=lcov"

[tasks."prod:build"]
description = "Build minified production executable"
run = "bun run build"
env = { NODE_ENV = "production" }

[tasks.start]
description = "Start the bot in production"
run = "bun run start"
env = { NODE_ENV = "production" }

[tasks."prod:start"]
description = "Start the compiled production executable"
run = "bun run start"
env = { NODE_ENV = "production" }

[tasks.docker-build]
description = "Build Docker image"
run = "docker build -t idle-code-redeemer ."

[tasks.docker-up]
description = "Start bot with Docker Compose"
run = "docker-compose up -d"

[tasks.docker-down]
description = "Stop bot with Docker Compose"
run = "docker-compose down"

[tasks.docker-logs]
description = "View Docker bot logs"
run = "docker-compose logs -f idle-code-redeemer"

[tasks.docker-restart]
description = "Restart bot container"
run = "docker-compose restart idle-code-redeemer"

[tasks.lint]
description = "Check code quality with ESLint"
run = "bun run lint"

[tasks."lint:fix"]
description = "Auto-fix ESLint issues"
run = "bun run lint:fix"

[tasks.gitleaks]
description = "Scan for secrets with Gitleaks"
run = "gitleaks detect --source . --verbose"

[tasks.audit]
description = "Audit dependencies for vulnerabilities"
run = "bun audit"

[tasks.outdated]
description = "Check for outdated dependencies"
run = "bun outdated"

[tasks.update]
description = "Update all dependencies"
run = "bun update"

[tasks.clean]
description = "Clean build artifacts and cache"
run = "rm -rf dist node_modules bun.lockb"

[tasks.setup]
description = "Complete initial setup"
depends = ["install"]
run = '''
echo "✅ Dependencies installed!"
echo ""
echo "Next steps:"
echo "1. Copy .env.example to .env"
echo "2. Add your DISCORD_TOKEN"
echo "3. Run: mise run dev"
'''

[tasks.commitlint]
description = "Validate commit message format"
run = "bunx commitlint --edit"

[tasks.help]
description = "Show all available tasks"
run = "mise tasks --list"
