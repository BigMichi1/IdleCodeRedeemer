[env]
# Mise environment configuration for Idle Code Redeemer Bot

[tools]
# Bun runtime and package manager
bun = "1.3"
# Node.js as fallback (optional, some tools may still need it)
node = "24"

[tasks.install]
description = "Install dependencies with Bun"
run = "bun install"

[tasks.dev]
description = "Run bot in development mode with TypeScript support"
run = "bun run dev"
env = { NODE_ENV = "development" }

[tasks.build]
description = "Build TypeScript to JavaScript"
run = "bun run build"

[tasks.start]
description = "Start the bot in production"
run = "bun start"
env = { NODE_ENV = "production" }

[tasks.watch]
description = "Watch TypeScript files and rebuild on changes"
run = "bun run watch"

[tasks.docker-build]
description = "Build Docker image"
run = "docker build -t idle-code-redeemer ."

[tasks.docker-up]
description = "Start bot with Docker Compose"
run = "docker-compose up -d"

[tasks.docker-down]
description = "Stop bot with Docker Compose"
run = "docker-compose down"

[tasks.docker-logs]
description = "View Docker bot logs"
run = "docker-compose logs -f idle-code-redeemer"

[tasks.docker-restart]
description = "Restart bot container"
run = "docker-compose restart idle-code-redeemer"

[tasks.lint]
description = "Check for syntax errors (runs tsc in check mode)"
run = "bun run --bun tsc -p tsconfig.bot.json --noEmit"

[tasks.audit]
description = "Audit dependencies for vulnerabilities"
run = "bun audit"

[tasks.update]
description = "Update all dependencies"
run = "bun update"

[tasks.clean]
description = "Clean build artifacts and cache"
run = "rm -rf dist node_modules bun.lockb"

[tasks.setup]
description = "Complete initial setup"
depends = ["install"]
run = '''
echo "✅ Dependencies installed!"
echo ""
echo "Next steps:"
echo "1. Copy .env.example to .env"
echo "2. Add your DISCORD_TOKEN"
echo "3. Run: mise run dev"
'''

[tasks.help]
description = "Show all available tasks"
run = "mise tasks --list"
